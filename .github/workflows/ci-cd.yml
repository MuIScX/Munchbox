name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  BACKEND_IMAGE: ${{ secrets.DOCKER_HUB_USERNAME }}/munchbox-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKER_HUB_USERNAME }}/munchbox-frontend

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Test Backend
  # ─────────────────────────────────────────
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: munchbox_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create venv and install dependencies
        working-directory: ./backend
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Run tests
        working-directory: ./backend
        env:
          DATABASE_URL: mysql+pymysql://root:root@127.0.0.1:3306/munchbox_test
          SECRET_KEY: test-secret-key
          ENVIRONMENT: test
        run: |
          source venv/bin/activate
          pytest tests/ -v --tb=short

  # ─────────────────────────────────────────
  # JOB 2: Test Frontend
  # ─────────────────────────────────────────
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ./Frontend/munchboxui/package-lock.json

      - name: Install dependencies
        working-directory: ./Frontend/munchboxui
        run: npm ci

      - name: Build check
        working-directory: ./Frontend/munchboxui
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: npm run build

  # ─────────────────────────────────────────
  # JOB 3: Build & Push Docker Images
  # only runs on push to main (not on PRs)
  # ─────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/backend.Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./Frontend/munchboxui
          file: ./Frontend/munchboxui/frontend.Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────
  # JOB 4: Deploy to Linode
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to Linode
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy config files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.LINODE_HOST }}
          username: ${{ secrets.LINODE_USER }}
          key: ${{ secrets.LINODE_SSH_KEY }}
          source: "docker-compose.prod.yml,nginx.conf"
          target: "/opt/munchbox"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.LINODE_HOST }}
          username: ${{ secrets.LINODE_USER }}
          key: ${{ secrets.LINODE_SSH_KEY }}
          envs: DOCKER_HUB_USERNAME,DOCKER_HUB_TOKEN
          script: |
            cd /opt/munchbox

            # Login to Docker Hub
            echo "$DOCKER_HUB_TOKEN" | docker login -u "$DOCKER_HUB_USERNAME" --password-stdin

            # Ensure mysql is running
            docker compose -f docker-compose.prod.yml up -d mysql
            echo "Waiting for MySQL to be healthy..."
            sleep 15

            # Pull latest images
            docker pull $DOCKER_HUB_USERNAME/munchbox-backend:latest
            docker pull $DOCKER_HUB_USERNAME/munchbox-frontend:latest

            # Restart backend, frontend, nginx
            docker compose -f docker-compose.prod.yml up -d --no-deps --force-recreate backend frontend nginx
            echo "Waiting for backend to start..."
            sleep 10

            # Run DB migrations / create tables
            docker exec munchbox-backend python -c "
            from app.db import engine, Base
            from app.models import *
            Base.metadata.create_all(bind=engine)
            print('DB tables ensured.')
            "

            # Clean up old images
            docker image prune -f
        env:
          DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
          DOCKER_HUB_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}