events {
    worker_connections 1024;
}

http {
    # --- Basic Settings ---
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    types_hash_max_size 2048;
    server_tokens       off;  # Hide nginx version

    # --- Logging ---
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # --- Gzip Compression ---
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types        text/plain text/css text/xml application/json
                      application/javascript application/xml+rss
                      application/atom+xml image/svg+xml;

    # --- Rate Limiting ---
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=general:10m  rate=60r/m;

    # --- HTTP → HTTPS Redirect ---
    server {
        listen      80;
        server_name munchbox.live www.munchbox.live;
        return 301  https://www.munchbox.live$request_uri;
    }

    # --- Redirect non-www → www ---
    server {
        listen      443 ssl;
        server_name munchbox.live;

        ssl_certificate     /etc/letsencrypt/live/munchbox.live/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/munchbox.live/privkey.pem;

        return 301 https://www.munchbox.live$request_uri;
    }

    # --- Main HTTPS Server ---
    server {
        listen      443 ssl;
        server_name www.munchbox.live;

        # --- SSL ---
        ssl_certificate     /etc/letsencrypt/live/munchbox.live/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/munchbox.live/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # --- Security Headers ---
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options           "SAMEORIGIN"                          always;
        add_header X-Content-Type-Options    "nosniff"                             always;
        add_header X-XSS-Protection          "1; mode=block"                       always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;

        # --- Client Upload Limit ---
        client_max_body_size 20M;

        # --- Frontend ---
        location / {
            limit_req zone=general burst=20 nodelay;

            proxy_pass         http://frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";  # WebSocket support
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
        }

        # --- Backend API ---
        location /api/ {
            limit_req zone=api_limit burst=10 nodelay;

            proxy_pass         http://backend:8001;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;

            proxy_read_timeout    600s;
            proxy_connect_timeout 600s;
            proxy_send_timeout    600s;

            # CORS preflight (if not handled in FastAPI)
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin  "https://www.munchbox.live";
                add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
                add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-API-Key";
                add_header Content-Length 0;
                return 204;
            }
        }

        # --- Block hidden files (.env, .git, etc.) ---
        location ~ /\. {
            deny all;
        }
    }
}
