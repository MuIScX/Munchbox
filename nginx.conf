events {}

http {
    server {
        listen 80;
        server_name munchbox.live www.munchbox.live;
        return 301 https://www.munchbox.live$request_uri;
    }

    server {
        listen 443 ssl;
        server_name munchbox.live www.munchbox.live;

        ssl_certificate /etc/letsencrypt/live/munchbox.live/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/munchbox.live/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            proxy_pass http://frontend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto https;
        }

        location /api/ {
            proxy_pass http://backend:8001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto https;
        }
    }
}